<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lesson Tracker Pro - Pupil Invitation</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --sunset-bright: #FF6B35;
      --sunset: #F7931E;
      --sunset-dark: #E55A2B;
      --dark-bg: #1A1A2E;
      --dark-card: #16213E;
      --dark-border: #2A2A4A;
      --light-bg: #F8F6F2;
      --light-card: #FFFFFF;
      --light-border: #E8E6E1;
      --success: #4CAF50;
      --error: #F44336;
      --warning: #FF9800;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: var(--light-bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      width: 100%;
    }

    .card {
      background: var(--light-card);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      border: 1px solid var(--light-border);
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--sunset-bright), var(--sunset));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 28px;
      color: white;
      box-shadow: 0 4px 16px rgba(255, 107, 53, 0.3);
    }

    .header h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1A1A2E;
      margin-bottom: 8px;
    }

    .header p {
      font-size: 14px;
      color: #666;
      line-height: 1.5;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }

    .form-group label .required {
      color: var(--sunset-bright);
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid var(--light-border);
      border-radius: 12px;
      font-size: 15px;
      transition: all 0.2s;
      background: #FAFAFA;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--sunset-bright);
      background: white;
      box-shadow: 0 0 0 4px rgba(255, 107, 53, 0.1);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--sunset-bright), var(--sunset));
      color: white;
      box-shadow: 0 4px 16px rgba(255, 107, 53, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 107, 53, 0.4);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: var(--light-bg);
      color: #333;
      border: 2px solid var(--light-border);
    }

    .btn-secondary:hover {
      background: var(--light-border);
    }

    .status-card {
      text-align: center;
      padding: 24px;
    }

    .status-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 36px;
    }

    .status-icon.pending {
      background: rgba(255, 152, 0, 0.1);
      color: var(--warning);
    }

    .status-icon.submitted {
      background: rgba(76, 175, 80, 0.1);
      color: var(--success);
    }

    .status-icon.approved {
      background: rgba(255, 107, 53, 0.1);
      color: var(--sunset-bright);
    }

    .status-icon.rejected {
      background: rgba(244, 67, 54, 0.1);
      color: var(--error);
    }

    .status-title {
      font-size: 20px;
      font-weight: 700;
      color: #1A1A2E;
      margin-bottom: 8px;
    }

    .status-text {
      font-size: 14px;
      color: #666;
      line-height: 1.6;
    }

    .error-card {
      text-align: center;
      padding: 24px;
    }

    .error-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(244, 67, 54, 0.1);
      color: var(--error);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 36px;
    }

    .loading {
      text-align: center;
      padding: 40px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid var(--light-border);
      border-top-color: var(--sunset-bright);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .hidden {
      display: none;
    }

    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: #999;
    }

    .instructor-name {
      background: linear-gradient(135deg, rgba(255, 107, 53, 0.1), rgba(247, 147, 30, 0.05));
      border: 1px solid rgba(255, 107, 53, 0.2);
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 24px;
      text-align: center;
    }

    .instructor-name span {
      font-size: 13px;
      color: #666;
    }

    .instructor-name strong {
      color: var(--sunset-bright);
      font-size: 15px;
    }

    .divider {
      height: 1px;
      background: var(--light-border);
      margin: 24px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Loading State -->
    <div id="loading" class="card loading">
      <div class="spinner"></div>
      <p>Loading invitation...</p>
    </div>

    <!-- Error State -->
    <div id="error" class="card error-card hidden">
      <div class="error-icon">✕</div>
      <h2 class="status-title">Invalid Invitation</h2>
      <p class="status-text" id="error-message">This invitation link is invalid or has expired.</p>
    </div>

    <!-- Form State -->
    <div id="form-card" class="card hidden">
      <div class="header">
        <div class="logo">🚗</div>
        <h1>Join Driving School</h1>
        <p>Complete the form below to register as a pupil</p>
      </div>

      <div id="instructor-info" class="instructor-name hidden">
        <span>Invited by</span><br>
        <strong id="instructor-name-text"></strong>
      </div>

      <form id="pupil-form">
        <div class="form-row">
          <div class="form-group">
            <label>First Name <span class="required">*</span></label>
            <input type="text" id="first-name" required placeholder="John">
          </div>
          <div class="form-group">
            <label>Last Name <span class="required">*</span></label>
            <input type="text" id="last-name" required placeholder="Doe">
          </div>
        </div>

        <div class="form-group">
          <label>Email Address <span class="required">*</span></label>
          <input type="email" id="email" required placeholder="john@example.com">
        </div>

        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" id="phone" placeholder="+44 7123 456789">
        </div>

        <div class="form-group">
          <label>Postcode</label>
          <input type="text" id="postcode" placeholder="SW1A 1AA">
        </div>

        <div class="form-group">
          <label>Pickup Address</label>
          <textarea id="pickup-address" placeholder="Enter your pickup address for lessons"></textarea>
        </div>

        <div class="divider"></div>

        <div class="form-group">
          <label>Experience Level</label>
          <select id="experience">
            <option value="">Select...</option>
            <option value="beginner">Beginner - Never driven</option>
            <option value="intermediate">Intermediate - Some experience</option>
            <option value="advanced">Advanced - Licence holder</option>
          </select>
        </div>

        <div class="form-group">
          <label>Gearbox Preference</label>
          <select id="gearbox">
            <option value="">Select...</option>
            <option value="manual">Manual</option>
            <option value="automatic">Automatic</option>
            <option value="any">No preference</option>
          </select>
        </div>

        <div class="form-group">
          <label>Additional Notes</label>
          <textarea id="notes" placeholder="Any special requirements or questions..."></textarea>
        </div>

        <button type="submit" class="btn btn-primary" id="submit-btn">
          Submit Registration
        </button>
      </form>
    </div>

    <!-- Status State (already submitted) -->
    <div id="status-card" class="card status-card hidden">
      <div id="status-icon" class="status-icon"></div>
      <h2 id="status-title" class="status-title"></h2>
      <p id="status-text" class="status-text"></p>
      <div class="divider"></div>
      <p id="status-details" class="status-text" style="font-size: 12px; color: #999;"></p>
    </div>

    <div class="footer">
      Powered by Lesson Tracker Pro
    </div>
  </div>

  <script>
    // ============================================
    // CONFIGURATION - Update these values
    // ============================================
    const SUPABASE_URL = 'YOUR_SUPABASE_URL';
    const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
    const APP_URL = 'https://lessontracker.pro';

    // Initialize Supabase
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Get token from URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    // DOM Elements
    const loadingEl = document.getElementById('loading');
    const errorEl = document.getElementById('error');
    const formCard = document.getElementById('form-card');
    const statusCard = document.getElementById('status-card');
    const errorMessage = document.getElementById('error-message');

    // Show/hide sections
    function showSection(section) {
      loadingEl.classList.add('hidden');
      errorEl.classList.add('hidden');
      formCard.classList.add('hidden');
      statusCard.classList.add('hidden');
      section.classList.remove('hidden');
    }

    // Show error
    function showError(message) {
      errorMessage.textContent = message;
      showSection(errorEl);
    }

    // Show status
    function showStatus(status, details) {
      const iconEl = document.getElementById('status-icon');
      const titleEl = document.getElementById('status-title');
      const textEl = document.getElementById('status-text');
      const detailsEl = document.getElementById('status-details');

      iconEl.className = 'status-icon ' + status;

      switch(status) {
        case 'submitted':
          iconEl.innerHTML = '⏳';
          titleEl.textContent = 'Waiting for Approval';
          textEl.textContent = 'Your registration has been submitted. The instructor will review your details and get back to you soon.';
          break;
        case 'approved':
          iconEl.innerHTML = '✓';
          titleEl.textContent = 'Registration Approved!';
          textEl.textContent = 'Great news! Your instructor has approved your registration. You can now create your account.';
          // Add signup button
          textEl.innerHTML += '<br><br><a href="' + APP_URL + '/signup?token=' + token + '" class="btn btn-primary" style="display: inline-block; text-decoration: none; width: auto; padding: 12px 24px;">Create Account</a>';
          break;
        case 'rejected':
          iconEl.innerHTML = '✕';
          titleEl.textContent = 'Registration Not Approved';
          textEl.textContent = 'Unfortunately, your registration was not approved. Please contact the instructor for more information.';
          break;
        case 'accepted':
          iconEl.innerHTML = '✓';
          titleEl.textContent = 'Already Registered';
          textEl.textContent = 'You have already registered with this instructor. Please download the app to continue.';
          break;
        default:
          iconEl.innerHTML = '?';
          titleEl.textContent = 'Unknown Status';
          textEl.textContent = 'Please contact your instructor for assistance.';
      }

      if (details) {
        detailsEl.textContent = details;
      }

      showSection(statusCard);
    }

    // Load invitation
    async function loadInvitation() {
      if (!token) {
        showError('No invitation token provided. Please check the link you received.');
        return;
      }

      try {
        const { data, error } = await supabase
          .rpc('get_invitation_by_token', { invite_token: token });

        if (error) throw error;

        if (!data || data.length === 0) {
          showError('This invitation link is invalid or has expired. Please contact your instructor for a new link.');
          return;
        }

        const invitation = data[0];

        // Check status
        switch(invitation.status) {
          case 'pending':
            // Show form
            showForm(invitation);
            break;
          case 'submitted':
            showStatus('submitted');
            break;
          case 'approved':
            showStatus('approved');
            break;
          case 'rejected':
            showStatus('rejected');
            break;
          case 'accepted':
            showStatus('accepted');
            break;
          case 'expired':
            showError('This invitation has expired. Please contact your instructor for a new link.');
            break;
          default:
            showError('Unknown invitation status. Please contact your instructor.');
        }
      } catch (err) {
        console.error('Error loading invitation:', err);
        showError('Unable to load invitation. Please try again later or contact your instructor.');
      }
    }

    // Show form with pre-filled data
    function showForm(invitation) {
      if (invitation.first_name) document.getElementById('first-name').value = invitation.first_name;
      if (invitation.last_name) document.getElementById('last-name').value = invitation.last_name;
      if (invitation.email) document.getElementById('email').value = invitation.email;
      if (invitation.phone) document.getElementById('phone').value = invitation.phone;
      if (invitation.postcode) document.getElementById('postcode').value = invitation.postcode;
      if (invitation.dropoff_address) document.getElementById('pickup-address').value = invitation.dropoff_address;

      showSection(formCard);
    }

    // Handle form submission
    document.getElementById('pupil-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const submitBtn = document.getElementById('submit-btn');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Submitting...';

      const formData = {
        first_name: document.getElementById('first-name').value.trim(),
        last_name: document.getElementById('last-name').value.trim(),
        email: document.getElementById('email').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        postcode: document.getElementById('postcode').value.trim(),
        dropoff_address: document.getElementById('pickup-address').value.trim(),
        experience: document.getElementById('experience').value,
        gearbox: document.getElementById('gearbox').value,
        notes: document.getElementById('notes').value.trim(),
      };

      try {
        const { data, error } = await supabase
          .rpc('submit_pupil_form', {
            invite_token: token,
            p_first_name: formData.first_name,
            p_last_name: formData.last_name,
            p_email: formData.email,
            p_phone: formData.phone,
            p_postcode: formData.postcode,
            p_dropoff_address: formData.dropoff_address,
            p_form_data: formData
          });

        if (error) throw error;

        if (data.success) {
          showStatus('submitted');
        } else {
          showError(data.error || 'Something went wrong. Please try again.');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Submit Registration';
        }
      } catch (err) {
        console.error('Error submitting form:', err);
        showError('Unable to submit form. Please try again later.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit Registration';
      }
    });

    // Initialize
    loadInvitation();
  </script>
</body>
</html>
