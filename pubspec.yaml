name: lesson_tracker_pro
description: CRM, diary and bookkeeping for driving instructors.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  shared_preferences: ^2.5.3
  intl: ^0.20.2
  uuid: ^4.5.1
  google_fonts: ^6.2.1
  url_launcher: ^6.3.1
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  image_picker: ^1.1.2
  device_calendar_plus: ^0.4.0
  supabase_flutter: ^2.8.2
  supabase_auth_ui: ^0.5.0
  flutter_secure_storage: ^9.2.4
  local_auth: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#F97316"
  adaptive_icon_foreground: "assets/images/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
